apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neo4j-minikube
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sujaydana82/neo4j-gitops
    targetRevision: main
    path: charts/neo4j
    helm:
      valueFiles:
        - environments/minikube/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: neo4j
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
