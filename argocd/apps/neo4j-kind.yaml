apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neo4j-kind
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sujaydana82/neo4j-gitops
    targetRevision: HEAD
    path: charts/neo4j
    helm:
      parameters:
        - name: values
          value: environments/kind/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: neo4j
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

